          { heading: "Types of Radiation", content: "Alpha (α): 2 protons + 2 neutrons (helium nucleus). Stopped by paper/skin. Range ~5cm in air. Strongly ionising. Beta (β): high-speed electron from nucleus (neutron → proton). Stopped by aluminium. Range ~1m in air. Moderately ionising. Gamma (γ): electromagnetic radiation from nucleus. Stopped by thick lead/concrete. Infinite range. Weakly ionising. In nuclear equations: alpha decay reduces mass number by 4 and atomic number by 2. Beta decay keeps mass number the same but increases atomic number by 1." },
          { heading: "Half-life", content: "Radioactive decay is random — you cannot predict which nucleus will decay next. Half-life = the time taken for the number of unstable nuclei (or the count rate/activity) to halve. After 1 half-life: ½ remains. After 2: ¼. After 3: ⅛. To calculate: if activity drops from 800 to 100 Bq in 30 minutes, it has halved 3 times (800→400→200→100), so the half-life is 30÷3 = 10 minutes." },

          { heading: "Nuclear Fission & Fusion", content: "Fission: splitting a large unstable nucleus (uranium/plutonium) after absorbing a neutron → two smaller nuclei + 2–3 neutrons + gamma rays + energy. The released neutrons can cause more fissions → chain reaction. Controlled in nuclear reactors for power. Uncontrolled = nuclear weapon. Fusion: joining two light nuclei to form a heavier one. Releases energy. Powers the Sun. Requires extremely high temperatures and pressures." },

          { heading: "Speed, Velocity & Acceleration", content: "Speed = distance ÷ time (s = vt). Typical speeds: walking ~1.5 m/s, running ~3 m/s, cycling ~6 m/s, speed of sound in air ~330 m/s. Velocity = speed in a given direction (vector). Acceleration = change in velocity ÷ time (a = Δv/t). Uniform acceleration equation: v² – u² = 2as. Free fall acceleration near Earth ≈ 9.8 m/s²." },
          { heading: "Distance-Time & Velocity-Time Graphs", content: "Distance-time: gradient = speed. Straight line = constant speed. Steeper = faster. Curved = accelerating. Horizontal = stationary. Velocity-time: gradient = acceleration. Flat line = constant velocity. Area under graph = distance travelled. Upward slope = acceleration. Downward slope = deceleration." },
          { heading: "Newton's Three Laws", content: "1st Law: An object stays at rest or moves at constant velocity unless acted on by a resultant force. (Inertia.) 2nd Law: F = ma. Resultant force = mass × acceleration. Greater force = greater acceleration. Greater mass = less acceleration for same force. 3rd Law: Every action has an equal and opposite reaction. Forces always come in pairs acting on different objects." },

          { heading: "Energy & Work", content: "Work done = force × distance (W = Fs). One joule = one newton × one metre. Kinetic energy: KE = ½mv². Gravitational potential energy: GPE = mgh. Work done against friction → temperature rise." },

        title: "Grammar – Tenses (Present, Perfect, Imperfect, Future, Conditional)",
        notes: [
          { heading: "Present Tense (Regular Verbs)", content: "-ER verbs (e.g. jouer): je joue, tu joues, il/elle joue, nous jouons, vous jouez, ils/elles jouent. -IR verbs (e.g. finir): je finis, tu finis, il finit, nous finissons, vous finissez, ils finissent. -RE verbs (e.g. vendre): je vends, tu vends, il vend, nous vendons, vous vendez, ils vendent. Key irregulars to memorise: être (je suis, tu es, il est, nous sommes, vous êtes, ils sont), avoir (j'ai, tu as, il a, nous avons, vous avez, ils ont), aller (je vais, tu vas, il va, nous allons, vous allez, ils vont), faire (je fais, tu fais, il fait, nous faisons, vous faites, ils font)." },
          { heading: "Past Tense (Passé Composé)", content: "Formed with: avoir/être (present) + past participle. Most verbs use avoir: j'ai mangé (I ate), j'ai fini (I finished), j'ai vendu (I sold). Past participles: -ER → -é, -IR → -i, -RE → -u. MRS VAN DER TRAMP verbs use être: je suis allé(e) (I went), je suis parti(e) (I left). With être, the past participle agrees with the subject (add -e for feminine, -s for plural). Common irregulars: fait (done/made), bu (drunk), vu (seen), lu (read), pris (taken), mis (put), dit (said), écrit (written)." },
          { heading: "Future & Conditional", content: "Near future: aller + infinitive. Je vais manger = I am going to eat. Simple future: stem + endings (-ai, -as, -a, -ons, -ez, -ont). Regular: infinitive + ending (jouer → je jouerai). Irregulars: être → je serai, avoir → j'aurai, aller → j'irai, faire → je ferai. Conditional: stem (same as future) + imperfect endings (-ais, -ais, -ait, -ions, -iez, -aient). Je voudrais = I would like. Je serais = I would be. J'aimerais = I would like/love." },
          { heading: "Imperfect Tense", content: "Used for: descriptions in the past, habitual/repeated actions, ongoing situations. Formed: nous stem (present tense) + imperfect endings (-ais, -ais, -ait, -ions, -iez, -aient). Example: jouer → nous jouons → je jouais (I used to play / I was playing). Only irregular stem: être → ét- (j'étais). Quand j'étais petit = When I was little. Il faisait beau = The weather was nice. Je jouais au foot tous les jours = I used to play football every day." },
          { heading: "Opinions & Justifications", content: "À mon avis / selon moi = in my opinion. Je pense que / je crois que / je trouve que = I think that. C'est (génial/super/nul/ennuyeux/intéressant) = It's (great/super/rubbish/boring/interesting). Ce qui me plaît, c'est… = What I like is… Ce que je n'aime pas, c'est… = What I don't like is… …parce que / car / puisque = because. …bien que (+ subjunctive) = although. …cependant / pourtant / néanmoins = however. Using connectives and opinion phrases lifts your grade — examiners are looking for justified opinions." },
          { heading: "Exam Tips for All Papers", content: "Listening: read questions carefully before the audio plays. Listen for negatives (ne…pas, ne…jamais) which reverse meaning. Watch for distractors — the recording may mention several options but only one is the answer. Reading: use cognates (words similar to English) to help. Watch for faux amis (false friends): actuellement = currently (NOT actually), rester = to stay (NOT to rest). Writing: use a range of tenses (past, present, future) to access higher marks. Include opinions with justifications. Use connectives (et, mais, aussi, cependant, de plus). Check adjective agreements and verb endings." },

function CountdownBanner() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 60000); return () => clearInterval(t); }, []);
  const examStart = new Date(2026, 3, 27, 9, 0, 0); // April 27, 2026 9am
  const diff = examStart - now;
  const days = Math.max(0, Math.floor(diff / 86400000));
  const hours = Math.max(0, Math.floor((diff % 86400000) / 3600000));
  return (
    <div style={{ background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", color: "#fff", padding: "14px 24px", textAlign: "center", fontFamily: "'Fraunces', serif", fontSize: 15, letterSpacing: "0.02em", borderBottom: "3px solid #e94560" }}>
      <span style={{ opacity: 0.7 }}>First exam in</span>{" "}
      <span style={{ fontWeight: 800, fontSize: 20, color: "#e94560" }}>{days}d {hours}h</span>{" "}
      <span style={{ opacity: 0.7 }}>— Music, Mon 27 April</span>
    </div>
  );
}

function NotesView({ topic }) {
  // Split content into individual knowledge points for better readability
  const formatContent = (content) => {
    // Split on ". " followed by a capital letter or number — these are separate points
    // Also split on " = " patterns that start a new term (for vocab sections)
    const points = content.split(/(?<=\.)\s+(?=[A-Z0-9('"'])|(?<=\))\s+(?=[A-Z])/);
    if (points.length <= 2) {
      // Short content — just return as-is
      return <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, lineHeight: 1.7, color: "var(--text-secondary)", margin: 0 }}>{content}</p>;
    }
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {points.map((point, j) => (
          <p key={j} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, lineHeight: 1.6, color: "var(--text-secondary)", margin: 0, paddingLeft: 8, borderLeft: "2px solid var(--card-border)" }}>
            {point.trim()}
          </p>
        ))}
      </div>
    );
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 22, fontWeight: 700, color: "var(--text-primary)", margin: 0, lineHeight: 1.3 }}>
        {topic.title}
      </h2>
      {topic.notes.map((note, i) => (
        <div key={i} style={{ background: "var(--card-bg)", borderRadius: 12, padding: "18px 20px", border: "1px solid var(--card-border)" }}>
          <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 700, color: "var(--accent)", margin: "0 0 10px 0", textTransform: "uppercase", letterSpacing: "0.05em" }}>
            {note.heading}
          </h3>
          {formatContent(note.content)}
        </div>
      ))}
    </div>
  );
}

function QuizView({ topic, subjectColor }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [answered, setAnswered] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const [finished, setFinished] = useState(false);
  const [wrongOnes, setWrongOnes] = useState([]);
  const [shuffleKey, setShuffleKey] = useState(0);

  // Shuffle questions and options on mount, topic change, or restart
  const shuffledQuiz = useMemo(() => {
    // Fisher-Yates shuffle
    const shuffle = (arr) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };
    const rawQuestions = topic.quiz || [];
    // Shuffle question order
    const shuffledQs = shuffle(rawQuestions);
    // For each question, shuffle the options and track the new correct index
    return shuffledQs.map((q) => {
      const correctText = q.options[q.correct !== undefined ? q.correct : 0];
      const shuffledOptions = shuffle(q.options);
      const newCorrectIdx = shuffledOptions.indexOf(correctText);
      return { ...q, options: shuffledOptions, correct: newCorrectIdx };
    });
  }, [topic, shuffleKey]);

  if (!shuffledQuiz || shuffledQuiz.length === 0) {
    return <p style={{ color: "var(--text-secondary)", fontFamily: "'DM Sans', sans-serif" }}>No quiz questions available for this topic yet.</p>;
  }

  const q = shuffledQuiz[current];
  const correctIdx = q.correct;

  const handleSelect = (idx) => {
    if (showAnswer) return;
    setSelected(idx);
    setShowAnswer(true);
    setAnswered((a) => a + 1);
    if (idx === correctIdx) {
      setScore((s) => s + 1);
    } else {
      setWrongOnes((w) => [...w, current]);
    }
  };

  const handleNext = () => {
    if (current < shuffledQuiz.length - 1) {
      setCurrent((c) => c + 1);
      setSelected(null);
      setShowAnswer(false);
    } else {
      setFinished(true);
    }
  };

  const handleRestart = () => {
    setCurrent(0);
    setSelected(null);
    setScore(0);
    setAnswered(0);
    setShowAnswer(false);
    setFinished(false);
    setWrongOnes([]);
    setShuffleKey((k) => k + 1);
  };

  if (finished) {
    const pct = Math.round((score / shuffledQuiz.length) * 100);
    return (
      <div style={{ textAlign: "center", padding: "40px 20px" }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>{pct >= 80 ? "🌟" : pct >= 60 ? "👍" : "📚"}</div>
        <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 28, color: "var(--text-primary)", margin: "0 0 8px 0" }}>
          {score} / {shuffledQuiz.length}
        </h2>
        <p style={{ color: "var(--text-secondary)", fontFamily: "'DM Sans', sans-serif", fontSize: 14, marginBottom: 24 }}>
          {pct >= 80 ? "Excellent! You really know this material." : pct >= 60 ? "Good effort — review the ones you missed." : "Worth going over the notes again before retrying."}
        </p>
        {wrongOnes.length > 0 && (
          <div style={{ textAlign: "left", background: "var(--card-bg)", borderRadius: 12, padding: 20, marginBottom: 20, border: "1px solid var(--card-border)" }}>
            <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, color: "#e94560", margin: "0 0 12px 0" }}>REVIEW THESE:</h3>
            {wrongOnes.map((idx) => (
              <div key={idx} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: "1px solid var(--card-border)" }}>
                <p style={{ fontSize: 13, color: "var(--text-primary)", margin: "0 0 4px 0", fontWeight: 500, fontFamily: "'DM Sans', sans-serif" }}>{shuffledQuiz[idx].q}</p>
                <p style={{ fontSize: 12, color: "#52b788", margin: 0, fontFamily: "'DM Sans', sans-serif" }}>✓ {shuffledQuiz[idx].options[shuffledQuiz[idx].correct]}</p>
              </div>
            ))}
          </div>
        )}
        <button onClick={handleRestart} style={{ background: subjectColor, color: "#fff", border: "none", borderRadius: 10, padding: "12px 32px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 14 }}>
          Try Again
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "var(--text-secondary)" }}>
          {current + 1} / {shuffledQuiz.length}
        </span>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#52b788" }}>
          Score: {score}
        </span>
      </div>
      <div style={{ background: "var(--card-bg)", borderRadius: 12, width: "100%", height: 4, marginBottom: 20, overflow: "hidden" }}>
        <div style={{ background: subjectColor, height: "100%", width: `${((current + 1) / shuffledQuiz.length) * 100}%`, borderRadius: 4, transition: "width 0.3s ease" }} />
      </div>
      <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 16, fontWeight: 600, color: "var(--text-primary)", margin: "0 0 20px 0", lineHeight: 1.5 }}>
        {q.q}
      </h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {q.options.map((opt, idx) => {
          let bg = "var(--option-bg)";
          let border = "1px solid var(--option-border)";
          let col = "var(--text-primary)";
          if (showAnswer) {
            if (idx === correctIdx) { bg = "rgba(82,183,136,0.15)"; border = "1px solid #52b788"; col = "#52b788"; }
            else if (idx === selected) { bg = "rgba(233,69,96,0.15)"; border = "1px solid #e94560"; col = "#e94560"; }
          } else if (idx === selected) { bg = "var(--card-hover)"; border = `1px solid ${subjectColor}`; }
          return (
            <button
              key={idx}
              onClick={() => handleSelect(idx)}
              style={{ background: bg, border, color: col, borderRadius: 10, padding: "14px 16px", cursor: showAnswer ? "default" : "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 14, textAlign: "left", transition: "all 0.15s ease", lineHeight: 1.4 }}
            >
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, opacity: 0.5, marginRight: 10 }}>
                {String.fromCharCode(65 + idx)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>
      {showAnswer && (
        <div style={{ marginTop: 16 }}>
          <div style={{ background: "var(--card-bg)", borderRadius: 10, padding: "14px 16px", marginBottom: 16, borderLeft: `3px solid ${selected === correctIdx ? "#52b788" : "#e94560"}` }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: selected === correctIdx ? "#52b788" : "#e94560", margin: "0 0 4px 0", fontFamily: "'DM Sans', sans-serif" }}>
              {selected === correctIdx ? "✓ Correct!" : "✗ Not quite"}
            </p>
            {q.a && (
              <p style={{ fontSize: 13, color: "var(--text-secondary)", margin: 0, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.5 }}>
                {q.a}
              </p>
            )}
          </div>
          <button
            onClick={handleNext}
            style={{ background: subjectColor, color: "#fff", border: "none", borderRadius: 10, padding: "12px 28px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 14, width: "100%" }}
          >
            {current < shuffledQuiz.length - 1 ? "Next Question →" : "See Results"}
          </button>
        </div>
      )}
    </div>
  );
}

function ExamTimetable() {
  return (
    <div style={{ maxWidth: 600 }}>
      <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 22, fontWeight: 700, color: "var(--text-primary)", margin: "0 0 16px 0" }}>Exam Timetable</h2>
      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
        {EXAM_SCHEDULE.map((e, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "120px 1fr 80px", gap: 12, alignItems: "center", padding: "10px 14px", background: i % 2 === 0 ? "var(--card-bg)" : "transparent", borderRadius: 8 }}>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "var(--text-secondary)" }}>{e.date}</span>
            <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 500, color: "var(--text-primary)" }}>{e.subject}</span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "var(--text-secondary)", textAlign: "right" }}>{e.time}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Dashboard({ onSubjectClick }) {
  const subjectEntries = Object.entries(SUBJECTS);
  return (
    <div style={{ maxWidth: 700 }}>
      <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 26, fontWeight: 800, color: "var(--text-primary)", margin: "0 0 6px 0" }}>
        Ivon's Revision Hub
      </h2>
      <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "var(--text-secondary)", margin: "0 0 28px 0" }}>
        GCSE Year 10 End-of-Year Exams — Sutton Grammar School
      </p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12, marginBottom: 32 }}>
        {subjectEntries.map(([id, s]) => {
          const topicCount = s.topics.filter(t => t.id !== "placeholder").length;
          const quizCount = s.topics.reduce((sum, t) => sum + (t.quiz ? t.quiz.length : 0), 0);
          return (
            <button
              key={id}
              onClick={() => onSubjectClick(id)}
              style={{
                background: `linear-gradient(135deg, ${s.color}22, ${s.color}11)`,
                border: `1px solid ${s.color}33`,
                borderRadius: 14,
                padding: "20px 18px",
                cursor: "pointer",
                textAlign: "left",
                transition: "all 0.2s ease",
              }}
            >
              <div style={{ fontSize: 28, marginBottom: 8 }}>{s.icon}</div>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 700, color: "var(--text-primary)", marginBottom: 2 }}>{s.name}</div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: s.color }}>{s.board}</div>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "var(--text-secondary)", marginTop: 8 }}>
                {topicCount > 0 ? `${topicCount} topic${topicCount > 1 ? "s" : ""} · ${quizCount} questions` : "Coming soon"}
              </div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "var(--text-secondary)", marginTop: 4, opacity: 0.7 }}>
                {s.examDate}
              </div>
            </button>
          );
        })}
      </div>
      <ExamTimetable />
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────

function App() {
  const [activeSubject, setActiveSubject] = useState(null);
  const [activeTopic, setActiveTopic] = useState(null);
  const [mode, setMode] = useState("notes"); // "notes" | "quiz"

  const subject = activeSubject ? SUBJECTS[activeSubject] : null;
  const topic = subject && activeTopic ? subject.topics.find((t) => t.id === activeTopic) : null;
  const [darkMode, setDarkMode] = useState(true);

  useEffect(() => {
    if (subject && subject.topics.length > 0) {
      setActiveTopic(subject.topics[0].id);
      setMode("notes");
    }
  }, [activeSubject]);

  const handleBack = () => { setActiveSubject(null); setActiveTopic(null); setMode("notes"); };

  const dark = {
    "--text-primary": "#e8e6e3",
    "--text-secondary": "#a09b96",
    "--bg": "#0d0d0f",
    "--surface": "#141416",
    "--card-bg": "rgba(255,255,255,0.04)",
    "--card-border": "rgba(255,255,255,0.06)",
    "--card-hover": "rgba(255,255,255,0.06)",
    "--option-bg": "rgba(255,255,255,0.06)",
    "--option-border": "rgba(255,255,255,0.08)",
    "--bar-bg": "rgba(255,255,255,0.06)",
    "--bar-border": "rgba(255,255,255,0.06)",
    "--sidebar-active": "rgba(255,255,255,0.12)",
    "--toggle-bg": "rgba(255,255,255,0.04)",
    "--subject-inactive-bg": "rgba(255,255,255,0.06)",
    "--subject-inactive-border": "rgba(255,255,255,0.1)",
    "--home-bg": "rgba(255,255,255,0.04)",
    "--home-border": "rgba(255,255,255,0.08)",
    "--home-active": "rgba(255,255,255,0.12)",
  };
  const light = {
    "--text-primary": "#1a1a1a",
    "--text-secondary": "#555555",
    "--bg": "#f5f5f0",
    "--surface": "#ffffff",
    "--card-bg": "rgba(0,0,0,0.03)",
    "--card-border": "rgba(0,0,0,0.08)",
    "--card-hover": "rgba(0,0,0,0.05)",
    "--option-bg": "rgba(0,0,0,0.04)",
    "--option-border": "rgba(0,0,0,0.1)",
    "--bar-bg": "rgba(0,0,0,0.04)",
    "--bar-border": "rgba(0,0,0,0.08)",
    "--sidebar-active": "rgba(0,0,0,0.06)",
    "--toggle-bg": "rgba(0,0,0,0.05)",
    "--subject-inactive-bg": "rgba(0,0,0,0.04)",
    "--subject-inactive-border": "rgba(0,0,0,0.1)",
    "--home-bg": "rgba(0,0,0,0.04)",
    "--home-border": "rgba(0,0,0,0.1)",
    "--home-active": "rgba(0,0,0,0.08)",
  };
  const theme = darkMode ? dark : light;

  return (
    <div style={{
      ...theme,
      "--accent": subject ? subject.color : "#e94560",
      minHeight: "100vh",
      background: "var(--bg)",
      fontFamily: "'DM Sans', sans-serif",
      transition: "background 0.3s ease, color 0.3s ease",
    }}>
      <style>{fonts}</style>
      <CountdownBanner />
      
      {/* Subject selector bar */}
      <div style={{ borderBottom: "1px solid var(--bar-border)", padding: "12px 20px", overflowX: "auto", display: "flex", gap: 8, justifyContent: "center" }}>
        <button
          onClick={handleBack}
          style={{
            background: !activeSubject ? "var(--home-active)" : "var(--home-bg)",
            color: "var(--text-secondary)",
            border: "1px solid var(--home-border)",
            borderRadius: 12,
            padding: "12px 14px",
            cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 11,
            fontWeight: 600,
            minWidth: 50,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            flexShrink: 0,
          }}
        >
          🏠
        </button>
        {Object.entries(SUBJECTS).map(([id, s]) => (
          <SubjectCard key={id} id={id} subject={s} isActive={activeSubject === id} onClick={() => setActiveSubject(id)} darkMode={darkMode} />
        ))}
        <button
          onClick={() => setDarkMode(!darkMode)}
          style={{
            background: "var(--home-bg)",
            color: "var(--text-secondary)",
            border: "1px solid var(--home-border)",
            borderRadius: 12,
            padding: "12px 14px",
            cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 16,
            minWidth: 50,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            flexShrink: 0,
            marginLeft: "auto",
          }}
          title={darkMode ? "Switch to light mode" : "Switch to dark mode"}
        >
          {darkMode ? "☀️" : "🌙"}
        </button>
      </div>

      {/* Main content */}
      <div style={{ padding: "24px 20px", maxWidth: 1100, margin: "0 auto" }}>
        {!activeSubject ? (
          <Dashboard onSubjectClick={setActiveSubject} />
        ) : (
          <div style={{ display: "flex", gap: 24, alignItems: "flex-start", flexWrap: "wrap" }}>
            {/* Topic sidebar */}
            <div style={{ minWidth: 220, maxWidth: 260, flexShrink: 0 }}>
              <button onClick={handleBack} style={{ background: "none", border: "none", color: "var(--text-secondary)", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, padding: "4px 0", marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}>
                ← All subjects
              </button>
              <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 20, fontWeight: 700, color: subject.color, margin: "0 0 4px 0", display: "flex", alignItems: "center", gap: 8 }}>
                <span>{subject.icon}</span> {subject.name}
              </h2>
              <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "var(--text-secondary)", margin: "0 0 16px 0" }}>
                {subject.board} · {subject.examDate}
              </p>
              <TopicSidebar topics={subject.topics} activeTopicId={activeTopic} onSelect={(id) => { setActiveTopic(id); setMode("notes"); }} />
            </div>

            {/* Content area */}
            <div style={{ flex: 1, minWidth: 300 }}>
              {topic && (
                <>
                  {/* Notes/Quiz toggle */}
                  <div style={{ display: "flex", gap: 4, marginBottom: 20, background: "var(--toggle-bg)", borderRadius: 10, padding: 4, width: "fit-content" }}>
                    {["notes", "quiz"].map((m) => (
                      <button
                        key={m}
                        onClick={() => setMode(m)}
                        style={{
                          background: mode === m ? subject.color : "transparent",
                          color: mode === m ? "#fff" : "var(--text-secondary)",
                          border: "none",
                          borderRadius: 8,
                          padding: "8px 20px",
                          cursor: "pointer",
                          fontFamily: "'DM Sans', sans-serif",
                          fontSize: 13,
                          fontWeight: 600,
                          transition: "all 0.15s ease",
                          textTransform: "capitalize",
                        }}
                      >
                        {m === "notes" ? "📝 Notes" : "❓ Quiz"}
                      </button>
                    ))}
                  </div>
                  {mode === "notes" ? <NotesView topic={topic} /> : <QuizView topic={topic} subjectColor={subject.color} />}
                </>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
